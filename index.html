<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1e1e1e" />
  <title>Mealdice</title>
  <link rel="icon" href="favicon.ico" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
</head>
<body>
  <header class="app-header">
    <h1>Mealdice</h1>
  </header>

  <main id="main">
    <div id="boot-error" class="boot-error" hidden>
      <p id="boot-error-msg">Couldn't load recipes.</p>
      <button type="button" id="reload-btn">Reload</button>
    </div>

    <section class="filters" id="filters" hidden>
     <details id="filters-details" open>
      <summary class="filters-summary">
        <span>Filters</span>
        <span class="chevron" aria-hidden="true">▾</span>
      </summary>
      <div class="filter-group">
        <label class="group-label">Meal</label>
        <div class="pill-group" role="radiogroup" aria-label="Meal type" id="meal-type-group">
          <button type="button" class="pill" role="radio" aria-checked="false" data-value="breakfast">Breakfast</button>
          <button type="button" class="pill" role="radio" aria-checked="false" data-value="lunch">Lunch</button>
          <button type="button" class="pill" role="radio" aria-checked="false" data-value="dinner">Dinner</button>
        </div>
      </div>

      <div class="filter-group">
        <label class="group-label">Cooking state</label>
        <div class="pill-group" role="radiogroup" aria-label="Cooking state" id="cook-state-group">
          <button type="button" class="pill" role="radio" aria-checked="true" data-value="any">Any</button>
          <button type="button" class="pill" role="radio" aria-checked="false" data-value="scratch">From scratch</button>
          <button type="button" class="pill" role="radio" aria-checked="false" data-value="assembly">Assembly only</button>
        </div>
      </div>

      <div class="filter-group">
        <label class="group-label">Method <span class="hint">(any if none)</span></label>
        <div class="pill-group multi" id="method-group">
          <button type="button" class="pill" aria-pressed="false" data-value="instant_pot">Instant Pot</button>
          <button type="button" class="pill" aria-pressed="false" data-value="stove">Stove</button>
          <button type="button" class="pill" aria-pressed="false" data-value="air_fryer">Air Fryer</button>
          <button type="button" class="pill" aria-pressed="false" data-value="oven">Oven</button>
          <button type="button" class="pill" aria-pressed="false" data-value="microwave">Microwave</button>
          <button type="button" class="pill" aria-pressed="false" data-value="no_cook">No-Cook</button>
        </div>
      </div>

      <div class="filter-group">
        <label class="group-label">Max prep time</label>
        <div class="pill-group" role="radiogroup" aria-label="Max prep time" id="prep-time-group">
          <button type="button" class="pill" role="radio" aria-checked="false" data-value="15">&lt; 15 min</button>
          <button type="button" class="pill" role="radio" aria-checked="false" data-value="30">&lt; 30 min</button>
          <button type="button" class="pill" role="radio" aria-checked="false" data-value="60">&lt; 60 min</button>
          <button type="button" class="pill" role="radio" aria-checked="true" data-value="any">Any</button>
        </div>
      </div>

      <div class="filter-group">
        <label class="group-label" for="out-of-search">Out of <span class="hint">(hard exclude)</span></label>
        <div class="chip-field">
          <div class="chips" id="out-of-chips" aria-live="polite"></div>
          <input type="text" id="out-of-search" placeholder="Search ingredients…" autocomplete="off" />
          <ul class="suggestions" id="out-of-suggestions" hidden></ul>
        </div>
      </div>

      <div class="filter-group">
        <label class="group-label" for="dont-want-search">Don't want this meal <span class="hint">(soft)</span></label>
        <div class="chip-field">
          <div class="chips" id="dont-want-chips" aria-live="polite"></div>
          <input type="text" id="dont-want-search" placeholder="Search ingredients…" autocomplete="off" />
          <ul class="suggestions" id="dont-want-suggestions" hidden></ul>
        </div>
      </div>

     </details>
     <div class="filter-actions">
       <button type="button" id="reset-btn" class="secondary">Reset filters</button>
       <button type="button" id="roll-btn" class="primary">Roll</button>
     </div>
    </section>

    <section id="result" class="result" hidden aria-live="polite"></section>
  </main>

  <script src="app.js"></script>
</body>
</html>
